[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers

[coverage:run]
branch = True
source = app
omit =
    */tests/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

[flake8]
max-line-length = 100
exclude = venv,__pycache__,.git,.env
ignore = E203,W503

[mypy]
python_version = 3.12
ignore_missing_imports = True
warn_return_any = True
warn_unused_configs = True

[isort]
profile = black
line_length = 100
